experiment_name: "Multi-Agent Bash Refactor"
system_prompt: "You are an expert python engineer. Return ONLY raw code or json as requested. Do not include markdown formatting or explanations."
orchestrator_models:
  - "openai/ollama/ws/qwen2.5-coder:14b"
  - "openai/ollama/ws/llama3.1:8b"
  - "openai/ollama/ws/deepseek-r1:14b"
subagent_model: "openai/ollama/sre/llama3.1:8b"
test_cases:
  - name: "Refactor check_deployments.sh"
    input_file: "src/scripts/check_deployments.sh"
    expected_output_criteria: "The script must use the subprocess module for HTTP and SSH commands. It must include error handling (try-except) for HTTP requests. It must have an if __name__ == '__main__': entrypoint."
judge_model: "openai/ollama/ws/qwen2.5-coder:14b"
