experiment_name: "Multi-Agent Blog Generation Benchmark"
workflow: "multi_agent_blog_gen"
system_prompt: "You are an expert technical writer and developer advocate."
pipeline_combinations:
  - generator: "ollama/llama3.1:8b"
    critic: "ollama/deepseek-r1:14b"
    refiner: "ollama/qwen2.5-coder:14b"
  - generator: "ollama/qwen2.5-coder:1.5b-base"
    critic: "ollama/qwen2.5-coder:14b"
    refiner: "ollama/qwen2.5-coder:14b"
  - generator: "ollama/deepseek-r1:7b"
    critic: "ollama/qwen3.5:27b"
    refiner: "ollama/qwen3.5:27b"
  - generator: "ollama/gemma4:latest"
    critic: "ollama/gemma4:26b"
    refiner: "ollama/gemma4:26b"
  - generator: "ollama/phi3.5:3.8b"
    critic: "ollama/phi4:14b"
    refiner: "ollama/phi4:14b"
  - generator: "ollama/hermes3:8b"
    critic: "ollama/command-r:35b"
    refiner: "ollama/command-r:35b"
judge_model: "openai/ollama/ws/qwen2.5-coder:14b"
test_cases:
  - name: "Multi-Agent Patterns Blog"
    input_file: "Learning/multi-agent-patterns/README.md"
    task_prompt: "Convert the provided README into an engaging blog post."
    expected_output_criteria: "Must have a catchy title, headings, and integrate any critic feedback to improve the structure."
