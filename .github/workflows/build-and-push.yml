name: Build and Push

on:
  push:
    branches: [ main ]
    paths:
      - 'agent-*/Dockerfile'
      - 'agent-*/pyproject.toml'
      - 'agent-*/uv.lock'
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build and push agent images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        agent:
          - agent-sre-patrol
          - agent-storage-report
          - agent-media-health
          - agent-network-sentinel
          - agent-vision-patrol
          - agent-data-patrol

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.agent }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.agent }}
          push: true
          tags: |
            ghcr.io/collani-homelab/homelab-${{ matrix.agent }}:latest
            ghcr.io/collani-homelab/homelab-${{ matrix.agent }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.agent }}
          cache-to: type=gha,scope=${{ matrix.agent }},mode=max
