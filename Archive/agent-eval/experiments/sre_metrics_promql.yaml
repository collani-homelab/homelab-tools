experiment_name: "Single-Agent PromQL Generation"
system_prompt: "You are an expert SRE. Return ONLY a valid PromQL query. No markdown formatting or explanations."
models_to_test:
  # 3070ti (8GB VRAM) candidates
  - "openai/ollama/ws/qwen2.5-coder:1.5b-base"
  - "openai/ollama/ws/llama3.1:8b"
  - "openai/ollama/ws/qwen2.5-coder:7b"
  - "openai/ollama/ws/deepseek-r1:7b"
  - "openai/ollama/ws/deepseek-coder:6.7b"
  - "openai/ollama/ws/mistral:latest"
  # 5080 (16GB VRAM) candidates
  - "openai/ollama/ws/qwen2.5-coder:14b"
  - "openai/ollama/ws/deepseek-r1:14b"
  - "openai/ollama/ws/gemma4:latest"
test_cases:
  - name: "95th Percentile Response Time"
    input_file: "src/scripts/benchmarks/sre_inputs/mock_prom_schema.md"
    task_prompt: "Write a PromQL query to find the 95th percentile response time for the 'grafana' container over the last 5 minutes."
    expected_output_criteria: "The query must use histogram_quantile. It must use the 0.95 quantile. It must query the http_request_duration_seconds metric (likely with a _bucket suffix). It must filter by container=\"grafana\". It must use rate() over [5m]."
judge_model: "openai/ollama/ws/qwen2.5-coder:14b"
